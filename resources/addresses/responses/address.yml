description: Returns an address object if a valid identifier was provided.

headers:
  ratelimit-limit:
    $ref: "../../../shared/headers/ratelimit.yml#/ratelimit-limit"
  ratelimit-remaining:
    $ref: "../../../shared/headers/ratelimit.yml#/ratelimit-remaining"
  ratelimit-reset:
    $ref: "../../../shared/headers/ratelimit.yml#/ratelimit-reset"

content:
  application/json:
    schema:
      anyOf:
        - $ref: "../../../shared/models/address/address.yml"
        - $ref: "../../../shared/models/address/address_ncoa.yml"
      discriminator:
        propertyName: address_line1
        mapping:
          "NCOA": "../../../shared/models/address/address_ncoa.yml"

  