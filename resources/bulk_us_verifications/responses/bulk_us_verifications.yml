description: Returns a list of US verification objects.

headers:
  ratelimit-limit:
    $ref: "../../../shared/headers/ratelimit.yml#/ratelimit-limit"
  ratelimit-remaining:
    $ref: "../../../shared/headers/ratelimit.yml#/ratelimit-remaining"
  ratelimit-reset:
    $ref: "../../../shared/headers/ratelimit.yml#/ratelimit-reset"

content:
  application/json:
    schema:
      $ref: "../models/us_verifications.yml"

    example:
      addresses:
        - id: us_ver_c7cb63d68f8d6
          recipient: LOB.COM
          primary_line: 42 EXAMPLE RD
          secondary_line: ""
          urbanization: ""
          last_line: ANYTOWN MA 02134
          deliverability: deliverable
          valid_address: true
          components:
            primary_number: "42"
            street_predirection: ""
            street_name: EXAMPLE
            street_suffix: RD
            street_postdirection: ""
            secondary_designator: ""
            secondary_number: ""
            pmb_designator: ""
            pmb_number: ""
            extra_secondary_designator: ""
            extra_secondary_number: ""
            city: ANYTOWN
            state: MA
            zip_code: "02134"
            zip_code_plus_4: ""
            zip_code_type: standard
            delivery_point_barcode: "021340000000"
            address_type: commercial
            record_type: street
            default_building_address: false
            county: ANY COUNTY
            county_fips: "00000"
            carrier_route: C000
            carrier_route_type: city_delivery
            po_box_only_flag: "N"
            latitude: 37.77597542841264
            longitude: -122.3929557343685
          deliverability_analysis:
            dpv_confirmation: Y
            dpv_cmra: N
            dpv_vacant: N
            dpv_active: Y
            dpv_inactive_reason: ""
            dpv_throwback: N
            dpv_non_delivery_day_flag: N
            dpv_non_delivery_day_values: ""
            dpv_no_secure_location: N
            dpv_door_not_accessible: N
            dpv_footnotes:
              - AA
              - BB
            ews_match: false
            lacs_indicator: ""
            lacs_return_code: ""
            suite_return_code: ""
          lob_confidence_score:
            score: 100
            level: high
          object: us_verification
      errors: false
