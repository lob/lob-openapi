post:
  operationId: identity_validation

  summary: Identity Validation

  description: >-
    Validates whether a given name is associated with an address.

  tags:
    - Identity Validation

  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "./models/identity_validation_writable.yml"
        example:
          recipient: "Larry Lobster"
          primary_line: "42 Example Rd."
          secondary_line: ""
          city: "Anytown"
          state: "MA"
          zip_code: "02134"

      application/x-www-form-urlencoded:
        schema:
          $ref: "./models/identity_validation_writable.yml"
        example:
          recipient: "Larry Lobster"
          primary_line: "42 Example Rd."
          secondary_line: ""
          city: "Anytown"
          state: "MA"
          zip_code: "02134"

      multipart/form-data:
        schema:
          $ref: "./models/identity_validation_writable.yml"
        example:
          recipient: "Larry Lobster"
          primary_line: "42 Example Rd."
          secondary_line: ""
          city: "Anytown"
          state: "MA"
          zip_code: "02134"

  responses:
    "200":
      $ref: responses/identity_validation.yml

    default:
      $ref: responses/identity_validation_error.yml

  x-codeSamples:
    - lang: Shell
      source: |
        curl https://api.lob.com/v1/identity_validation \
          -u <YOUR_LIVE_API_KEY>: \
          -d "recipient=Larry Lobster" \
          -d "primary_line=42 Example Rd" \
          -d "secondary_line=" \
          -d "urbanization=" \
          -d "city=Anytown" \
          -d "state=MA" \
          -d "zip_code=02134" \
      label: CURL
